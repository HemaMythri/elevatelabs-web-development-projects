<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Project Explorer</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>GitHub Project Explorer</h1>

<p>Discover Trending Open Source Projects</p>

<button id="darkModeBtn">
🌙 Dark Mode
</button>

</header>

<section class="search-section">

<input
type="text"
id="searchInput"
placeholder="Search repositories..."
>

<select id="languageFilter">

<option value="">All Languages</option>
<option value="JavaScript">JavaScript</option>
<option value="Python">Python</option>
<option value="Java">Java</option>
<option value="TypeScript">TypeScript</option>
<option value="C++">C++</option>

</select>

<select id="sortFilter">

<option value="stars">Sort By Stars</option>
<option value="forks">Sort By Forks</option>
<option value="updated">Sort By Updated</option>

</select>

<button id="searchBtn">
Search
</button>

<button id="viewBookmarks">
View Bookmarks
</button>

</section>

<section class="analytics">

<h2>Repository Analytics</h2>

<canvas id="repoChart"></canvas>

</section>

<section>

<h2 class="section-title">
⭐ Bookmarked Repositories
</h2>

<div id="bookmarkContainer"></div>

</section>

<section>

<h2 class="section-title">
Repositories
</h2>

<div id="repoContainer"></div>

</section>
<footer>

<p>
Built by Hema Mythri |
Powered by GitHub API
</p>

</footer>

<script src="script.js"></script>

</body>

</html>
